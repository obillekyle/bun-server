<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Existing Blog Post | Bakery 🚀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/counter.css" />
  <script src="/script/index.ts" defer></script>
</head>

<body>
  <main class="container">
    <header class="hero">
      <div class="logo-wrapper">
        <span class="logo-emoji">📖</span>
      </div>
      <h1 class="gradient-text">Existing Post</h1>
      <p class="subtitle">This is a static HTML file located at <code>/blog/existing.html</code>.</p>
    </header>

    <div class="card-grid">
      <section class="card glass-effect full-width">
        <div class="card-header">
          <span class="card-icon">📄</span>
          <h2>Static Route Priority</h2>
        </div>
        <p class="card-desc">
          In Bakery, specific file paths like this one take priority over dynamic routes like
          <code>[id].html</code>.
          This allows you to mix fixed content with dynamic parameters seamlessly.
        </p>
        <div class="action-group center">
          <a href="/" class="primary-btn">
            Back to Dashboard
          </a>
        </div>
      </section>
    </div>
  </main>
</body>

</html>
